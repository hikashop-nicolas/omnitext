<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <title>Omnitext</title>
  </head>
  <body>
    <div id="app">
      <header id="toolbar">
        <button class="brand" id="btn-settings" type="button" data-i18n-title="app.settings" title="Settings" data-i18n-aria="app.settings" aria-label="Settings" aria-haspopup="dialog">
          <svg class="brand-mark" viewBox="0 0 24 24" aria-hidden="true">
            <defs><linearGradient id="om-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4f46e5" /><stop offset="1" stop-color="#22d3ee" /></linearGradient></defs>
            <rect width="24" height="24" rx="6" fill="url(#om-grad)" />
            <rect x="8" y="6" width="8" height="12" rx="1.6" fill="#fff" />
            <rect x="9.7" y="8.6" width="4.6" height="1.5" rx="0.75" fill="#4f46e5" />
            <rect x="9.7" y="11.2" width="4.6" height="1.5" rx="0.75" fill="#6366f1" />
            <rect x="9.7" y="13.8" width="2.8" height="1.5" rx="0.75" fill="#22d3ee" />
          </svg>
          <span>Omnitext</span>
        </button>
        <span class="sep"></span>
        <div class="group">
          <button id="btn-back" class="btn icon" data-i18n-title="app.back" data-i18n-aria="app.back" title="Back" aria-label="Back" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
          </button>
          <button id="btn-new" class="btn icon" data-i18n-title="app.new" data-i18n-aria="app.new" title="New" aria-label="New">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M12 11v6M9 14h6"/></svg>
          </button>
          <button id="btn-open" class="btn icon" data-i18n-title="app.open" data-i18n-aria="app.open" title="Open" aria-label="Open">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          </button>
          <button id="btn-save" class="btn btn-primary icon" data-i18n-title="app.save" data-i18n-aria="app.save" title="Save" aria-label="Save">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15.2 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.8a2 2 0 0 0-.6-1.4l-3.8-3.8a2 2 0 0 0-1.4-.6Z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7"/></svg>
          </button>
        </div>
        <span id="tools" class="group"></span>
        <div class="doc">
          <span id="filename" data-i18n="app.untitled">untitled</span>
          <button id="dirty" class="dirty" type="button" data-i18n-aria="app.saveStatus" aria-label="Save status"></button>
        </div>
        <span class="spacer"></span>
        <span class="field"><span data-i18n="app.format">Format</span> <span id="format-label" class="pill"></span></span>
        <span id="reason" class="pill"></span>
      </header>
      <main id="editor"></main>
      <aside id="panel" class="panel" hidden>
        <div class="panel-header">
          <span id="panel-title" class="panel-title"></span>
          <button id="panel-close" data-i18n-title="app.close" title="Close">×</button>
        </div>
        <div id="panel-body" class="panel-body"></div>
      </aside>
      <footer id="status">
        <span class="status-dot"></span>
        <span id="status-text">Ready. Your edits are kept on this device; use Save to write out the file.</span>
        <button id="view-btn" class="status-view" type="button" data-i18n-title="app.view" title="View" aria-label="View" aria-haspopup="menu" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          <span id="view-label"></span>
        </button>
      </footer>
      <div id="newdlg" class="modal" hidden>
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="newdlg-title">
          <h2 id="newdlg-title" class="modal-title" data-i18n="app.newDocument">New document</h2>
          <label class="combobox-label" for="new-format-input" data-i18n="app.format">Format</label>
          <div class="combobox" id="new-format-combo">
            <input id="new-format-input" type="text" autocomplete="off" role="combobox" aria-expanded="false" aria-controls="new-format-list" data-i18n-placeholder="app.formatSearch" placeholder="Search formats…" />
            <ul id="new-format-list" class="combobox-list" role="listbox" hidden></ul>
          </div>
          <div id="new-format-opts" hidden>
            <label class="combobox-label" for="new-paper" data-i18n="app.pageSize">Page size</label>
            <select id="new-paper" class="new-opt-select">
              <option value="a4" data-i18n="app.pageSizeA4">A4</option>
              <option value="a3" data-i18n="app.pageSizeA3">A3</option>
              <option value="a5" data-i18n="app.pageSizeA5">A5</option>
              <option value="b4" data-i18n="app.pageSizeB4">B4 (JIS)</option>
              <option value="b5" data-i18n="app.pageSizeB5">B5 (JIS)</option>
              <option value="letter" data-i18n="app.pageSizeLetter">US Letter</option>
              <option value="legal" data-i18n="app.pageSizeLegal">US Legal</option>
              <option value="tabloid" data-i18n="app.pageSizeTabloid">Tabloid</option>
              <option value="executive" data-i18n="app.pageSizeExecutive">Executive</option>
            </select>
            <label class="combobox-label" for="new-orientation" data-i18n="app.orientation">Orientation</label>
            <select id="new-orientation" class="new-opt-select">
              <option value="portrait" data-i18n="app.orientationPortrait">Portrait</option>
              <option value="landscape" data-i18n="app.orientationLandscape">Landscape</option>
            </select>
            <label class="combobox-label" for="new-direction" data-i18n="app.writingDirection">Writing direction</label>
            <select id="new-direction" class="new-opt-select">
              <option value="ltr" data-i18n="app.dirLtr">Left to right</option>
              <option value="rtl" data-i18n="app.dirRtl">Right to left (Arabic, Hebrew)</option>
              <option value="vertical" data-i18n="app.dirVertical">Vertical (Japanese)</option>
            </select>
            <label class="modal-field modal-check"><input id="new-paginated" type="checkbox" checked /> <span data-i18n="app.paginated">Show pages (paginated view)</span></label>
          </div>
          <div class="modal-actions">
            <button id="new-cancel" class="btn" type="button" data-i18n="app.cancel">Cancel</button>
            <button id="new-create" class="btn btn-primary" type="button" data-i18n="app.create">Create</button>
          </div>
        </div>
      </div>
      <div id="settingsdlg" class="modal" hidden>
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="settingsdlg-title">
          <h2 id="settingsdlg-title" class="modal-title" data-i18n="app.settings">Settings</h2>
          <label class="modal-field"><span data-i18n="app.yourName">Your name</span> <input id="setting-name" type="text" autocomplete="name" maxlength="120" /></label>
          <p class="modal-hint" data-i18n="app.yourNameHint">Used as the author of comments and replies you add.</p>
          <label class="modal-field"><span data-i18n="app.pageSize">Default page size</span>
            <select id="setting-pagesize">
              <option value="a4" data-i18n="app.pageSizeA4">A4</option>
              <option value="letter" data-i18n="app.pageSizeLetter">US Letter</option>
            </select>
          </label>
          <label class="modal-field modal-check"><input id="setting-paginated" type="checkbox" /> <span data-i18n="app.paginated">Show pages (paginated view)</span></label>
          <p class="modal-hint" data-i18n="app.docSettingsHint">For Word and OpenDocument files. Page size applies only when the file specifies none.</p>
          <div class="modal-actions">
            <button id="settings-cancel" class="btn" type="button" data-i18n="app.cancel">Cancel</button>
            <button id="settings-save" class="btn btn-primary" type="button" data-i18n="app.save">Save</button>
          </div>
        </div>
      </div>
    </div>
    <input id="file-input" type="file" hidden />
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
