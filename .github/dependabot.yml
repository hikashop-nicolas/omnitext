# Keep the third-party npm packages and the GitHub Actions current. Dependabot DOES track the
# in-house git dependencies (richdoc/pdfedit/geoedit/sheetedit/mediaplay) and opens a per-lib PR
# when their `main` HEAD moves, so it also keeps those current; `npm run bump-libs` is now just a
# manual "bump every lib at once" shortcut. The xlsx CDN tarball is still invisible; bump by hand.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Roll all minor + patch bumps into one PR to cut noise; the CI test gate vets it.
      minor-and-patch:
        update-types: ["minor", "patch"]
    # Majors come as individual PRs so each breaking bump is reviewed and verified on its own.
    ignore:
      # Only pinned to satisfy the peer of the vanilla filerobot-image-editor (the package we
      # import), which peers on ^4.7.0. Any 5.x here breaks npm install with ERESOLVE.
      - dependency-name: "react-filerobot-image-editor"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
