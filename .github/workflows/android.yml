name: Build Android APK

# Builds the Android app from the same web bundle and publishes a downloadable
# debug APK to a rolling "android-latest" release, so the README can link to it.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # needed to publish the APK as a release asset

concurrency:
  group: android-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run test # don't ship an APK from a bundle whose tests fail
      - run: npm run build # the same web build GitHub Pages uses

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v4
      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" > /dev/null

      - name: Sync web assets into the Android project
        run: npx cap sync android

      # Build a signed release APK when the keystore secrets are set; otherwise fall
      # back to a debug APK so the download link keeps working before signing is set up.
      - name: Build APK (sideload) and, when signed, the AAB (Play)
        id: apk
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          APP_VERSION_CODE: ${{ github.run_number }}
        run: |
          cd android
          chmod +x gradlew
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
            export ANDROID_KEYSTORE_FILE="$RUNNER_TEMP/release.keystore"
            ./gradlew assembleRelease bundleRelease --no-daemon
            cp app/build/outputs/apk/release/app-release.apk ../omnitext.apk
            cp app/build/outputs/bundle/release/app-release.aab ../omnitext.aab
            echo "kind=signed release" >> "$GITHUB_OUTPUT"
          else
            ./gradlew assembleDebug --no-daemon
            cp app/build/outputs/apk/debug/app-debug.apk ../omnitext.apk
            echo "kind=debug (no signing secrets set)" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish rolling release (APK for sideload)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: android-latest
          name: Latest Android APK
          prerelease: true
          files: omnitext.apk
          body: |
            Android APK built automatically from the latest `main` (${{ steps.apk.outputs.kind }}).
            Sideload it to try Omnitext on Android; Android may warn about installing from an
            unknown source. Not distributed through Google Play.

      # The AAB is for the Play Console (testers/production); download it from this run's
      # artifacts with: gh run download <run-id> -n play-aab
      - name: Upload AAB artifact (for Play Console)
        if: steps.apk.outputs.kind == 'signed release'
        uses: actions/upload-artifact@v7
        with:
          name: play-aab
          path: omnitext.aab
          retention-days: 60
